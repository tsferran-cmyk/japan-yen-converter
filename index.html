<!doctype html>
<html lang="ca">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
  <title>JPY Converter</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <section class="card hero">
      <div>
        <p id="eyebrow" class="eyebrow">Canvi ràpid</p>
        <h1 id="title">¥ JPY → € EUR</h1>
      </div>
      <div class="topControls">
        <select id="langSelect" class="langSelect" aria-label="Idioma">
          <option value="ca">Català</option>
          <option value="en">English</option>
        </select>
        <span id="statusBadge" class="badge">Comprovant…</span>
      </div>
    </section>

    <section class="card converter">
      <label id="amountLabel" for="yenInput">Import en iens</label>
      <div class="inputRow">
        <span>¥</span>
        <input id="yenInput" inputmode="decimal" autocomplete="off" placeholder="1000" value="1000" />
        <button id="clearBtn" class="clearBtn" type="button" aria-label="Esborra">×</button>
      </div>

      <div class="resultBox">
        <p id="resultLabel">Equivalent aproximat</p>
        <strong id="resultValue">—</strong>
      </div>

      <div id="quickAmounts" class="chips" aria-label="Imports ràpids">
        <button data-yen="100">¥100</button>
        <button data-yen="500">¥500</button>
        <button data-yen="1000">¥1.000</button>
        <button data-yen="5000">¥5.000</button>
        <button data-yen="10000">¥10.000</button>
        <button data-yen="50000">¥50.000</button>
      </div>
    </section>

    <section class="card settings">
      <div class="row">
        <div>
          <p id="rateLabel" class="label">Canvi utilitzat</p>
          <p id="rateText" class="value">—</p>
        </div>
        <button id="refreshBtn" class="secondary" type="button">Actualitza</button>
      </div>
      <p id="updatedText" class="muted">Sense actualitzar encara</p>

      <label id="feeLabel" for="feeInput" class="feeLabel">Comissió targeta / marge (%)</label>
      <div class="inputRow small">
        <input id="feeInput" inputmode="decimal" autocomplete="off" value="0" />
        <span>%</span>
      </div>
      <p id="feeText" class="muted">Sense comissió aplicada.</p>
    </section>

    <section class="card note">
      <p id="noteText"><strong>Funciona offline:</strong> si no hi ha internet, calcula amb l’últim canvi guardat i t’indica quan es va actualitzar.</p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
