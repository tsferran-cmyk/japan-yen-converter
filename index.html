<!doctype html>
<html lang="ca">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
  <title>JPY → EUR</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <section class="card hero">
      <div>
        <p class="eyebrow">Canvi ràpid</p>
        <h1>¥ JPY → € EUR</h1>
      </div>
      <span id="statusBadge" class="badge">Comprovant…</span>
    </section>

    <section class="card converter">
      <label for="yenInput">Import en iens</label>
      <div class="inputRow">
        <span>¥</span>
        <input id="yenInput" inputmode="decimal" autocomplete="off" placeholder="Introdueix import" value="1000" autofocus />
        <button id="clearBtn" class="clearBtn" type="button" aria-label="Esborrar import">×</button>
      </div>

      <div class="resultBox">
        <p>Equivalent aproximat</p>
        <strong id="eurResult">—</strong>
      </div>

      <div class="chips" aria-label="Imports ràpids">
        <button data-yen="100">¥100</button>
        <button data-yen="500">¥500</button>
        <button data-yen="1000">¥1.000</button>
        <button data-yen="5000">¥5.000</button>
        <button data-yen="10000">¥10.000</button>
        <button data-yen="50000">¥50.000</button>
      </div>
    </section>

    <section class="card settings">
      <div class="row">
        <div>
          <p class="label">Canvi utilitzat</p>
          <p id="rateText" class="value">—</p>
        </div>
        <button id="refreshBtn" class="secondary">Actualitza</button>
      </div>
      <p id="updatedText" class="muted">Sense actualitzar encara</p>

      <label for="feeInput" class="feeLabel">Comissió targeta / marge (%)</label>
      <div class="inputRow small">
        <input id="feeInput" inputmode="decimal" autocomplete="off" value="0" />
        <span>%</span>
      </div>
      <p id="feeText" class="muted">Sense comissió aplicada.</p>
    </section>

    <section class="card note">
      <p><strong>Funciona offline:</strong> si no hi ha internet, calcula amb l’últim canvi guardat i t’indica quan es va actualitzar.</p>
    </section>
  </main>

  <script src="app.js?v=2"></script>
</body>
</html>
